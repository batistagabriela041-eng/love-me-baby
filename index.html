<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-vindo ao Meu Site</title>
    <style>
        /* Estilos gerais da página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74ebe1 0%, #d4a5ec 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        /* Caixa de boas-vindas */
        .welcome-card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #4a148c;
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Botão interativo */
        .btn {
            display: inline-block;
            background-color: #4a148c;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn:hover {
            background-color: #7b1fa2;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>Olá, Bem-vindo!</h1>
        <p>Estamos muito felizes em ter você aqui. Este é um site simples criado para dar as boas-vindas aos nossos visitantes.</p>
        <a href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQLimi6eHwRHqs_qWYD8sDEHPKNylxN0VwtCA&s" class="btn">Explorar Site</a>
    </div>

</body>
</html>
